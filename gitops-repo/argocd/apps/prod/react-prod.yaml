# ============================================================
# Child Application — java-app7 (Prod)
# Purpose: Deploys app7 to the prod EKS cluster
# Sync: Manual + approval gate
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: prod
    app: java-app7
spec:
  project: prod
  source:
    repoURL: 'https://github.com/vishutyagi0210/demo-argocd.git'
    targetRevision: HEAD
    path: gitops-repo/helm
    helm:
      valueFiles:
        - values.yaml
        - ../applications/prod/react-app-prod-values.yaml
  destination:
    # In-cluster mode — both ArgoCD and the workloads live on the same cluster
    server: https://kubernetes.default.svc
    namespace: react-app-prod
  syncPolicy:
    # Manual sync only — auto-sync explicitly disabled for safety
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
