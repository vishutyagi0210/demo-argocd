apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-uat
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: uat
    app: java-app6
spec:
  project: uat
  source:
    repoURL: 'https://github.com/vishutyagi0210/demo-argocd.git'
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
        - ../applications/uat/java-app-uat-values.yaml
  destination:
    # TODO: replace with cluster 2 API server URL after cluster 2 is registered in ArgoCD
    server: https://REPLACE_WITH_CLUSTER2_API_URL
    namespace: java-app-uat
  syncPolicy:
    # Manual sync only
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 2
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
