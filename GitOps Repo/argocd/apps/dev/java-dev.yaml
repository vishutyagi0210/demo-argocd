apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: dev
    app: java-app-dev
spec:
  project: dev
  source:
    repoURL: 'https://github.com/vishutyagi0210/demo-argocd.git'
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
        - ../applications/dev/java-app-dev-values.yaml
  destination:
    # TODO: replace with cluster 2 API server URL after cluster 2 is registered in ArgoCD
    server: https://REPLACE_WITH_CLUSTER2_API_URL
    namespace: java-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m