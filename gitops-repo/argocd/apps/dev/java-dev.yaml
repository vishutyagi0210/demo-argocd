apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: dev
    app: java-app-dev
spec:
  project: dev
  source:
    repoURL: 'https://github.com/vishutyagi0210/demo-argocd.git'
    targetRevision: HEAD
    path: gitops-repo/helm
    helm:
      valueFiles:
        - values.yaml
        - ../applications/dev/java-app-dev-values.yaml
  destination:
    # In-cluster mode — both ArgoCD and the workloads live on the same cluster
    server: https://kubernetes.default.svc
    namespace: java-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m