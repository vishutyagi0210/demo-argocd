# ============================================================
# Child Application — java-app7 (Prod)
# Purpose: Deploys app7 to the prod EKS cluster
# Sync: Manual + approval gate
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: prod
    app: java-app7
spec:
  project: prod
  source:
    repoURL: https://github.com/YOUR_ORG/spring-boot-realworld-example-app.git
    targetRevision: HEAD
    path: helm/platform-app
    helm:
      valueFiles:
        - values.yaml
        - ../../applications/app7/prod-values.yaml
  destination:
    server: https://prod-eks-endpoint.eks.amazonaws.com
    namespace: java-app7
  syncPolicy:
    # Manual sync only — auto-sync explicitly disabled for safety
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
