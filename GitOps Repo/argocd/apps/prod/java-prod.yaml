# ============================================================
# Child Application — java-app6 (Prod)
# Purpose: Deploys app6 to the prod EKS cluster
# Sync: Manual + approval gate
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    environment: prod
    app: java-app6
spec:
  project: prod
  source:
    repoURL: 'https://github.com/vishutyagi0210/demo-argocd.git'
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
        - ../applications/prod/java-app-prod-values.yaml
  destination:
    # TODO: replace with cluster 2 API server URL after cluster 2 is registered in ArgoCD
    server: https://REPLACE_WITH_CLUSTER2_API_URL
    namespace: java-app-prod
  syncPolicy:
    # Manual sync only — auto-sync explicitly disabled for safety
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
