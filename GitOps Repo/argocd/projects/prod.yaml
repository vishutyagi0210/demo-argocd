# ============================================================
# ArgoCD AppProject — Prod Environment
# Purpose: Groups all Prod apps. Allows deployment only to
# the prod EKS cluster and to prod namespaces.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Prod environment — manual sync with approval gate

  sourceRepos:
    - 'https://github.com/YOUR_ORG/spring-boot-realworld-example-app.git'

  destinations:
    # Control cluster (for parent Applications)
    - namespace: argocd
      server: https://kubernetes.default.svc
    # Prod EKS cluster only
    - namespace: 'java-app-prod'
      server: 'https://prod-eks-endpoint.eks.amazonaws.com'
    - namespace: 'react-app-prod'
      server: 'https://prod-eks-endpoint.eks.amazonaws.com'

  clusterResourceWhitelist:
    - group: ''
      kind: Namespace

  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: ReplicaSet
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: ServiceAccount
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'policy'
      kind: PodDisruptionBudget

  orphanedResources:
    warn: true
